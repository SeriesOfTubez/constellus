<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Constellus Logo</title>
  <style>
    body{background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:system-ui,sans-serif;gap:40px}
    .row{display:flex;align-items:flex-end;gap:48px;flex-wrap:wrap;justify-content:center}
    .card{display:flex;flex-direction:column;align-items:center;gap:10px}
    .label{color:#475569;font-size:11px;letter-spacing:.05em;text-transform:uppercase}
    .wm{font-weight:700;letter-spacing:-.02em;background:linear-gradient(to right,#60a5fa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo-row{display:flex;align-items:center;gap:10px}
    .panel{padding:32px 40px;border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:20px;border:1px solid #1e293b}
    .lp{background:#f8fafc;border-color:#e2e8f0}
    .pl{color:#64748b;font-size:12px;font-weight:500}
  </style>
</head>
<body>

<div class="panel">
  <div class="pl">Dark</div>
  <div class="row">

    <div class="card">
      <div class="logo-row">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
          <defs><linearGradient id="a" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
          <line x1="14" y1="5"  x2="24" y2="26" stroke="url(#a)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="33" y1="6"  x2="24" y2="26" stroke="url(#a)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="44" y1="17" x2="24" y2="26" stroke="url(#a)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="43" y1="35" x2="24" y2="26" stroke="url(#a)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="27" y1="42" x2="24" y2="26" stroke="url(#a)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="8"  y1="37" x2="24" y2="26" stroke="url(#a)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="6"  y1="18" x2="24" y2="26" stroke="url(#a)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <circle cx="14" cy="5"  r="2.4" fill="url(#a)"/>
          <circle cx="33" cy="6"  r="1.8" fill="url(#a)" opacity="0.85"/>
          <circle cx="44" cy="17" r="2"   fill="url(#a)" opacity="0.9"/>
          <circle cx="43" cy="35" r="1.5" fill="url(#a)" opacity="0.75"/>
          <circle cx="27" cy="42" r="2.2" fill="url(#a)" opacity="0.9"/>
          <circle cx="8"  cy="37" r="1.6" fill="url(#a)" opacity="0.8"/>
          <circle cx="6"  cy="18" r="2"   fill="url(#a)" opacity="0.85"/>
          <circle cx="24" cy="26" r="3.5" fill="url(#a)"/>
        </svg>
        <span class="wm" style="font-size:18px">Constellus</span>
      </div>
      <div class="label">Sidebar · 32px</div>
    </div>

    <div class="card">
      <div class="logo-row">
        <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
          <defs><linearGradient id="b" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
          <line x1="14" y1="5"  x2="24" y2="26" stroke="url(#b)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="33" y1="6"  x2="24" y2="26" stroke="url(#b)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="44" y1="17" x2="24" y2="26" stroke="url(#b)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="43" y1="35" x2="24" y2="26" stroke="url(#b)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="27" y1="42" x2="24" y2="26" stroke="url(#b)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="8"  y1="37" x2="24" y2="26" stroke="url(#b)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <line x1="6"  y1="18" x2="24" y2="26" stroke="url(#b)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
          <circle cx="14" cy="5"  r="2.4" fill="url(#b)"/>
          <circle cx="33" cy="6"  r="1.8" fill="url(#b)" opacity="0.85"/>
          <circle cx="44" cy="17" r="2"   fill="url(#b)" opacity="0.9"/>
          <circle cx="43" cy="35" r="1.5" fill="url(#b)" opacity="0.75"/>
          <circle cx="27" cy="42" r="2.2" fill="url(#b)" opacity="0.9"/>
          <circle cx="8"  cy="37" r="1.6" fill="url(#b)" opacity="0.8"/>
          <circle cx="6"  cy="18" r="2"   fill="url(#b)" opacity="0.85"/>
          <circle cx="24" cy="26" r="3.5" fill="url(#b)"/>
        </svg>
        <span class="wm" style="font-size:24px">Constellus</span>
      </div>
      <div class="label">Large · 56px</div>
    </div>

    <div class="card">
      <svg width="80" height="80" viewBox="0 0 48 48" fill="none">
        <defs><linearGradient id="c" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
        <line x1="14" y1="5"  x2="24" y2="26" stroke="url(#c)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <line x1="33" y1="6"  x2="24" y2="26" stroke="url(#c)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <line x1="44" y1="17" x2="24" y2="26" stroke="url(#c)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <line x1="43" y1="35" x2="24" y2="26" stroke="url(#c)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <line x1="27" y1="42" x2="24" y2="26" stroke="url(#c)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <line x1="8"  y1="37" x2="24" y2="26" stroke="url(#c)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <line x1="6"  y1="18" x2="24" y2="26" stroke="url(#c)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
        <circle cx="14" cy="5"  r="2.4" fill="url(#c)"/>
        <circle cx="33" cy="6"  r="1.8" fill="url(#c)" opacity="0.85"/>
        <circle cx="44" cy="17" r="2"   fill="url(#c)" opacity="0.9"/>
        <circle cx="43" cy="35" r="1.5" fill="url(#c)" opacity="0.75"/>
        <circle cx="27" cy="42" r="2.2" fill="url(#c)" opacity="0.9"/>
        <circle cx="8"  cy="37" r="1.6" fill="url(#c)" opacity="0.8"/>
        <circle cx="6"  cy="18" r="2"   fill="url(#c)" opacity="0.85"/>
        <circle cx="24" cy="26" r="3.5" fill="url(#c)"/>
      </svg>
      <div class="label">Icon only · 80px</div>
    </div>

  </div>
</div>

<div class="panel lp">
  <div class="pl" style="color:#94a3b8">Light</div>
  <div class="logo-row">
    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
      <defs><linearGradient id="d" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#0891b2"/></linearGradient></defs>
      <line x1="14" y1="5"  x2="24" y2="26" stroke="url(#d)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
      <line x1="33" y1="6"  x2="24" y2="26" stroke="url(#d)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
      <line x1="44" y1="17" x2="24" y2="26" stroke="url(#d)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
      <line x1="43" y1="35" x2="24" y2="26" stroke="url(#d)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
      <line x1="27" y1="42" x2="24" y2="26" stroke="url(#d)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
      <line x1="8"  y1="37" x2="24" y2="26" stroke="url(#d)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
      <line x1="6"  y1="18" x2="24" y2="26" stroke="url(#d)" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
      <circle cx="14" cy="5"  r="2.4" fill="url(#d)"/>
      <circle cx="33" cy="6"  r="1.8" fill="url(#d)" opacity="0.85"/>
      <circle cx="44" cy="17" r="2"   fill="url(#d)" opacity="0.9"/>
      <circle cx="43" cy="35" r="1.5" fill="url(#d)" opacity="0.75"/>
      <circle cx="27" cy="42" r="2.2" fill="url(#d)" opacity="0.9"/>
      <circle cx="8"  cy="37" r="1.6" fill="url(#d)" opacity="0.8"/>
      <circle cx="6"  cy="18" r="2"   fill="url(#d)" opacity="0.85"/>
      <circle cx="24" cy="26" r="3.5" fill="url(#d)"/>
    </svg>
    <span class="wm" style="font-size:18px;background:linear-gradient(to right,#2563eb,#0891b2);-webkit-background-clip:text">Constellus</span>
  </div>
</div>

</body>
</html>
