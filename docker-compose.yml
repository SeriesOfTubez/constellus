services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRETS_PROVIDER=env
      - DATABASE_URL=postgresql://sextant:sextant@db:5432/sextant
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app
      - data

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: sextant
      POSTGRES_PASSWORD: sextant
      POSTGRES_DB: sextant
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sextant"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - data

networks:
  app:
  data:

volumes:
  db_data:
