name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/python

      - name: SCA (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          soft_fail: false
          framework: dockerfile,github_actions

      - name: Dockerfile Lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  build:
    name: Build & Image Scan
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sextant-backend:${{ github.sha }} ./backend

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: sextant-backend:${{ github.sha }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
