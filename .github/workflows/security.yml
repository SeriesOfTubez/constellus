name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Minimal read-only permissions for all jobs (CKV_GHA_1)
permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/python

      - name: SCA (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .
          soft_fail: false
          framework: dockerfile,github_actions

      - name: Dockerfile Lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  build:
    name: Build & Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t constellus-backend:${{ github.sha }} ./backend --file backend/Dockerfile

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: constellus-backend:${{ github.sha }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
