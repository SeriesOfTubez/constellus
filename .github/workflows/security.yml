name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Minimal read-only permissions for all jobs (CKV_GHA_1)
permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (Semgrep)
        run: pip install semgrep && semgrep scan --config p/security-audit --config p/owasp-top-ten --config p/python --error --quiet
        # semgrep/semgrep-action is archived; running CLI directly is the current recommended approach

      - name: SCA (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: IaC Scan (Checkov)
        run: |
          pip install checkov
          checkov -d . --framework dockerfile --framework github_actions --compact --quiet

      - name: Dockerfile Lint (Hadolint)
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
            -o /tmp/hadolint && chmod +x /tmp/hadolint
          echo "=== .hadolint.yaml content ===" && cat .hadolint.yaml
          echo "=== hadolint version ===" && /tmp/hadolint --version
          find . -name 'Dockerfile' -not -path '*/node_modules/*' -print0 \
            | xargs -0 /tmp/hadolint --config .hadolint.yaml

  build:
    name: Build & Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t constellus-backend:${{ github.sha }} ./backend --file backend/Dockerfile

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: constellus-backend:${{ github.sha }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
