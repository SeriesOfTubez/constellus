name: Security

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

# security-events: write required for SARIF uploads to GitHub code scanning
permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Secret Scan (Gitleaks)
        id: gitleaks
        continue-on-error: true
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --config .gitleaks.toml --report-format sarif --report-path gitleaks.sarif
        # gitleaks-action@v2 is Node.js 20 only with no v3 available; CLI is consistent
        # with our semgrep/checkov/hadolint approach and has no Node.js dependency

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Fail on Gitleaks findings
        if: steps.gitleaks.outcome == 'failure'
        run: exit 1

      - name: SAST (Semgrep)
        id: semgrep
        continue-on-error: true
        run: pip install semgrep && semgrep scan --config p/security-audit --config p/owasp-top-ten --config p/python --error --sarif --output semgrep.sarif --quiet
        # semgrep/semgrep-action is archived; running CLI directly is the current recommended approach

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Fail on Semgrep findings
        if: steps.semgrep.outcome == 'failure'
        run: exit 1

      - name: SCA (Trivy)
        id: trivy_fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Fail on Trivy FS findings
        if: steps.trivy_fs.outcome == 'failure'
        run: exit 1

      - name: Generate SBOM (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json
          retention-days: 90

      - name: IaC Scan (Checkov)
        id: checkov
        continue-on-error: true
        run: |
          pip install checkov
          checkov -d . --framework dockerfile --framework github_actions --output cli --output sarif --output-file-path . --compact --quiet

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results_sarif.sarif
          category: checkov

      - name: Fail on Checkov findings
        if: steps.checkov.outcome == 'failure'
        run: exit 1

      - name: Dockerfile Lint (Hadolint)
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64 \
            -o /tmp/hadolint && chmod +x /tmp/hadolint
          find . -name 'Dockerfile' -not -path '*/node_modules/*' -print0 \
            | xargs -0 /tmp/hadolint --ignore DL3008
          # DL3008: apt-get version pinning impractical on Debian — see .hadolint.yaml
          # --config flag is broken with xargs -0 across all tested versions; --ignore is equivalent

  build:
    name: Build & Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security
    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t constellus-backend:${{ github.sha }} . --file backend/Dockerfile --target runtime

      - name: Scan backend image (Trivy — CVEs)
        id: trivy_image_vuln
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: constellus-backend:${{ github.sha }}
          scanners: vuln
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image-vuln.sarif

      - name: Upload image CVE SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-vuln.sarif
          category: trivy-image-vuln

      - name: Fail on image CVE findings
        if: steps.trivy_image_vuln.outcome == 'failure'
        run: exit 1

      - name: Scan backend image (Trivy — config)
        id: trivy_image_config
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: constellus-backend:${{ github.sha }}
          scanners: config
          exit-code: "1"
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image-config.sarif

      - name: Upload image config SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-config.sarif
          category: trivy-image-config

      - name: Fail on image config findings
        if: steps.trivy_image_config.outcome == 'failure'
        run: exit 1

      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: constellus-backend:${{ github.sha }}  # runtime stage — no Docker CLI
          format: cyclonedx
          output: sbom-image.cyclonedx.json

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-image-${{ github.sha }}
          path: sbom-image.cyclonedx.json
          retention-days: 90
